name: first-wf
on: push
jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v3
      - name: installing node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: installing dependencies
        run: npm ci
      - name: executing lint
        run: npm run lint
      - name: executing build
        run: npm run build
      - name: execute test
        run: npm run test
      - name: final-steps
        run: echo "all-steps are done!"

